# CI + push-to-deploy. The `test` job (typecheck, format, tests) runs on every
# push to main AND on every pull request to main, so dependency-bump PRs (e.g.
# Renovate bumping telegram-broadcast-kit) show a green/red check before merge.
# The `deploy` job runs ONLY on a push to main: it SSHes into the VPS, pulls
# the latest code, and rebuilds just this bot's container.
#
# This is a NO-DATABASE bot, so there is no migrate step (unlike the ayah bot,
# whose workflow runs `<bot>-migrate` first).
#
# Required GitHub secrets (repo -> Settings -> Secrets and variables ->
# Actions -> New repository secret):
#   SERVER_IP  the VPS IP address
#   SSH_KEY    a private SSH key whose public half is in the server's
#              /root/.ssh/authorized_keys
#
# These are the SAME two values every bot repo uses (the shared deploy key).
# A PRIVATE repo needs NO extra GitHub secret. The only private-repo
# requirement is server-side: the server must hold its own GitHub SSH key so
# `git pull` works (hetzner-cloud-server guide, 06, Part D). That is a
# one-time server setup, already in place if another private bot deploys from
# the same server.
#
# Until SERVER_IP and SSH_KEY are set, the deploy step fails at the connect
# step. That is expected; add the secrets to activate it.
name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Gate: typecheck + format + tests must pass before we touch production. A
  # push that breaks the build never reaches the server. Also runs on PRs so
  # the Renovate shared-kernel bump PR is checked.
  test:
    runs-on: ubuntu-latest
    # Dummy values so importing src/config.ts (which requires these at load
    # time) does not throw; the tests never connect to Telegram.
    env:
      BOT_TOKEN: ci-placeholder
      CHANNEL_CHAT_ID: '@ci-placeholder'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  deploy:
    needs: test
    # Only deploy on a real push to main, never on a pull request.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/bots/telegram/numninjas && git pull
            cd /opt/bots && docker compose up -d --build numninjas
            docker image prune -f
